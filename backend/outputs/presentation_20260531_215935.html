<script>
let cur = 0;
const total = 3;
function goTo(n) {
  document.getElementById('slide-'+cur).classList.remove('active');
  document.querySelectorAll('.dot')[cur].classList.remove('active');
  cur = Math.max(0, Math.min(n, total-1));
  document.getElementById('slide-'+cur).classList.add('active');
  document.querySelectorAll('.dot')[cur].classList.add('active');
  document.getElementById('counter').textContent = (cur+1) + ' / ' + total;
  document.getElementById('prevBtn').disabled = cur===0;
  document.getElementById('nextBtn').disabled = cur===total-1;
}
function prev() { goTo(cur-1); }
function next() { goTo(cur+1); }
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
});
</script>
